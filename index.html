<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">

    <nav class="bg-white shadow-md px-6 py-4 flex justify-between items-center">
        <a href="#">
            <img src="./imgs/logo.png" alt="Logo" class="h-20">
        </a>

        <div class="flex items-center gap-3">
            <span id="usernamedisplay" class="text-sm font-medium text-gray-700"></span>
            
            <button onclick="goto('login.html')" 
                    class="px-4 py-2 text-sm font-medium text-blue-600 border border-blue-600 rounded hover:bg-blue-50 transition">
                Login
            </button>
            
            <button onclick="goto('register.html')" 
                    class="px-4 py-2 text-sm font-medium text-green-600 border border-green-600 rounded hover:bg-green-50 transition">
                Register
            </button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto mt-12 px-4 space-y-12">
        
        <div class="flex flex-col md:flex-row gap-4">
            <div class="w-full md:w-1/4">
                <select id="searchtype" class="w-full rounded border border-gray-300 p-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="name">Search by Product Name</option>
                    <option value="category">Search by Category</option>
                </select>
            </div>
            
            <div class="w-full md:w-7/12">
                <input type="text" id="searchbox" placeholder="Search..."
                       class="w-full rounded border border-gray-300 p-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <div class="w-full md:w-1/6">
                <button onclick="searchProducts()" 
                        class="w-full bg-gray-900 text-white font-medium py-2 px-4 rounded hover:bg-gray-800 transition duration-200">
                    Search
                </button>
            </div>
        </div>

        <div>
            <div id="products-row" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

    </main>

    <script src="js/script.js"></script>

</body>
</html>
