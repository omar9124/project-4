<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">

    <nav class="bg-white shadow-sm px-6 py-3">
        <div class="max-w-7xl mx-auto flex items-center">
            <a href="index.html">
                <img src="./imgs/logo.png" alt="Logo" class="h-20">
            </a>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto mt-12 px-4 mb-6">
        <div class="bg-white p-8 rounded-lg shadow-lg border border-gray-100">
            
            <form class="space-y-5">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    
                    <div>
                        <label for="firstName" class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
                        <input type="text" id="firstname" placeholder="Enter first name" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        <span id="fnameError" class="text-red-600"></span>      
                    </div>
                    
                    <div>
                        <label for="lastName" class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
                        <input type="text" id="lastname" placeholder="Enter last name" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        <span id="lnameError" class="text-red-600"></span>   
                    </div>

                </div>

                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" id="email" placeholder="Enter email" required
                           class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    <span id="emailError" class="text-red-600"></span>   
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="password" placeholder="Enter password" required
                           class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    <span id="passwordError" class="text-red-600"></span>
                </div>

                <button type="button" onclick="register()" 
                        class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-md shadow-sm transition-colors duration-200">
                    Register
                </button>

                <p class="text-sm text-gray-600 mt-4">
                    Have an account? <a href="Login.html" class="text-blue-600 hover:underline font-medium">Login</a>
                </p>

            </form>

        </div>
    </main>

    <script src="js/script.js"></script>

</body>
</html>
